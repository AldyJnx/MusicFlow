version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        patterns:
          - "@types/*"
          - "eslint*"
          - "prettier"
          - "typescript"
        update-types:
          - "minor"
          - "patch"
      nestjs:
        patterns:
          - "@nestjs/*"
      react:
        patterns:
          - "react*"
          - "@radix-ui/*"
          - "@tanstack/*"
      testing:
        patterns:
          - "jest"
          - "vitest"
          - "@testing-library/*"
          - "playwright"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
