# =====================================================================
# Render Blueprint for MusicFlow backend + PostgreSQL
# Deploy: Render Dashboard -> New -> Blueprint -> point to this repo.
# Secrets marked `sync: false` must be filled in the Render dashboard.
# Redis is external (Upstash) -> set REDIS_URL with the rediss:// string.
# =====================================================================

databases:
  - name: musicflow-db
    plan: free
    databaseName: musicflow
    user: musicflow
    region: oregon

services:
  - type: web
    name: musicflow-backend
    runtime: docker
    plan: free
    region: oregon
    rootDir: apps/backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      # --- App ---
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000

      # --- Database (auto-wired from the Render Postgres above) ---
      - key: DATABASE_URL
        fromDatabase:
          name: musicflow-db
          property: connectionString

      # --- JWT (auto-generated by Render) ---
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d

      # --- Redis (Upstash) -> paste the rediss:// URL in the dashboard ---
      - key: REDIS_URL
        sync: false

      # --- Claude AI ---
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5-20251001

      # --- Cloudflare R2 storage (public buckets) ---
      - key: R2_ENDPOINT
        value: https://e6059b4515b414d738310669c6ca5977.r2.cloudflarestorage.com
      - key: R2_REGION
        value: auto
      - key: R2_BUCKET_AUDIO
        value: music-flow
      - key: R2_BUCKET_IMAGES
        value: music-flow-images
      - key: R2_PUBLIC_AUDIO_URL
        value: https://pub-f44a489bc1e94270836132b3136f0a8c.r2.dev
      - key: R2_PUBLIC_IMAGES_URL
        value: https://pub-7f3d08bcabf44d68b2a57424acfc9d48.r2.dev
      - key: R2_ACCESS_KEY
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false

      # --- Throttling ---
      - key: THROTTLE_TTL
        value: 60
      - key: THROTTLE_LIMIT
        value: 100

      # --- CORS + email links (fill with your *.pages.dev URL) ---
      - key: CORS_ORIGINS
        sync: false
      - key: APP_URL
        sync: false

      # --- SMTP (optional; leave unset to log links to console) ---
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
